<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pose Data Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #111; color: #eee; padding: 24px; }
  h1 { text-align: center; margin-bottom: 24px; font-size: 1.5rem; }
  .exercises { display: flex; flex-direction: column; gap: 32px; }
  .exercise { background: #1a1a1a; border-radius: 12px; padding: 20px; }
  .exercise h2 { margin-bottom: 12px; color: #6cf; font-size: 1.2rem; }
  .poses { display: flex; gap: 16px; flex-wrap: wrap; }
  .pose-card { text-align: center; }
  .pose-card canvas { background: #222; border-radius: 8px; border: 1px solid #333; }
  .pose-card p { margin-top: 6px; font-size: 0.85rem; color: #aaa; }
</style>
</head>
<body>
<h1>Exercise Pose Templates</h1>
<div class="exercises" id="root"></div>

<script type="module">
import { TEMPLATES, mirrorTemplate } from './src/poseData.js';

// COCO skeleton connections
const SKELETON = [
  [0,1],[0,2],[1,3],[2,4],           // head
  [5,6],[5,7],[7,9],[6,8],[8,10],    // arms
  [5,11],[6,12],[11,12],             // torso
  [11,13],[13,15],[12,14],[14,16],   // legs
];

const KEYPOINT_NAMES = [
  'nose','left_eye','right_eye','left_ear','right_ear',
  'left_shoulder','right_shoulder','left_elbow','right_elbow',
  'left_wrist','right_wrist','left_hip','right_hip',
  'left_knee','right_knee','left_ankle','right_ankle',
];

const COLORS = {
  head: '#ffdd57',
  arm: '#ff6b6b',
  torso: '#6cf',
  leg: '#69db7c',
};

function connectionColor(i, j) {
  if (i <= 4 || j <= 4) return COLORS.head;
  if ([7,8,9,10].includes(i) || [7,8,9,10].includes(j)) return COLORS.arm;
  if ((i === 5 || i === 6) && (j === 7 || j === 8)) return COLORS.arm;
  if ([13,14,15,16].includes(i) || [13,14,15,16].includes(j)) return COLORS.leg;
  return COLORS.torso;
}

function drawPose(canvas, template, label) {
  const W = 240, H = 300;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Find bounding box to auto-scale
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (let i = 0; i < 17; i++) {
    const x = template[i * 2], y = template[i * 2 + 1];
    minX = Math.min(minX, x); maxX = Math.max(maxX, x);
    minY = Math.min(minY, y); maxY = Math.max(maxY, y);
  }
  const rangeX = maxX - minX || 1, rangeY = maxY - minY || 1;
  const pad = 30;
  const scale = Math.min((W - pad * 2) / rangeX, (H - pad * 2) / rangeY);
  const offX = (W - rangeX * scale) / 2 - minX * scale;
  const offY = (H - rangeY * scale) / 2 - minY * scale;

  function tx(i) { return template[i * 2] * scale + offX; }
  function ty(i) { return template[i * 2 + 1] * scale + offY; }

  // Draw skeleton lines
  for (const [i, j] of SKELETON) {
    ctx.beginPath();
    ctx.moveTo(tx(i), ty(i));
    ctx.lineTo(tx(j), ty(j));
    ctx.strokeStyle = connectionColor(i, j);
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.7;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Draw keypoints
  for (let i = 0; i < 17; i++) {
    const x = tx(i), y = ty(i);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    const color = i <= 4 ? COLORS.head
      : i <= 10 ? COLORS.arm
      : i <= 12 ? COLORS.torso
      : COLORS.leg;
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

const exercises = [
  {
    name: 'Squats',
    poses: [
      { template: TEMPLATES.standing_up, label: 'Standing (Up)' },
      { template: TEMPLATES.squat_down, label: 'Squat (Down)' },
    ],
  },
  {
    name: 'Lunges',
    poses: [
      { template: TEMPLATES.standing_up, label: 'Standing (Up)' },
      { template: TEMPLATES.lunge_down, label: 'Lunge Down (Left Leg)' },
      { template: mirrorTemplate(TEMPLATES.lunge_down), label: 'Lunge Down (Right Leg)' },
    ],
  },
  {
    name: 'Pushups',
    poses: [
      { template: TEMPLATES.pushup_up, label: 'Pushup (Up)' },
      { template: TEMPLATES.pushup_down, label: 'Pushup (Down)' },
    ],
  },
];

const root = document.getElementById('root');
for (const ex of exercises) {
  const section = document.createElement('div');
  section.className = 'exercise';
  section.innerHTML = `<h2>${ex.name}</h2><div class="poses"></div>`;
  const posesDiv = section.querySelector('.poses');

  for (const pose of ex.poses) {
    const card = document.createElement('div');
    card.className = 'pose-card';
    const canvas = document.createElement('canvas');
    const p = document.createElement('p');
    p.textContent = pose.label;
    card.appendChild(canvas);
    card.appendChild(p);
    posesDiv.appendChild(card);
    drawPose(canvas, pose.template, pose.label);
  }

  root.appendChild(section);
}
</script>
</body>
</html>
