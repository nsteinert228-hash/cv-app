<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CV — Exercise Tracker</title>
  <link rel="stylesheet" href="src/styles.css?v=2">
  <style>
    .intro-msg {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: var(--max-width);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Camera Stage ── */
    .camera-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--glass-border);
      border-bottom: none;
    }

    .camera-stage canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .camera-stage video {
      display: none;
    }

    /* ── Loading Overlay ── */
    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-page);
      z-index: 20;
      transition: opacity 0.4s var(--ease-out);
    }

    .loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-overlay.hidden {
      display: none;
    }

    .loading-overlay p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 14px;
    }

    .loading-overlay .fallback-controls {
      display: none;
      margin-top: 20px;
      gap: 12px;
    }

    .loading-overlay .fallback-controls.visible {
      display: flex;
    }

    .fallback-btn {
      padding: 10px 20px;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      background: var(--bg-surface);
      color: var(--text-primary);
      font-size: 0.88rem;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background var(--duration-fast);
      font-family: inherit;
    }

    .fallback-btn:hover {
      background: var(--bg-surface-hover);
    }

    .fallback-btn input[type="file"] {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Rep Overlay ── */
    .rep-overlay {
      display: none;
      position: absolute;
      top: 16px;
      right: 20px;
      text-align: right;
      pointer-events: none;
      z-index: 10;
    }

    .rep-count {
      font-size: 56px;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6), 0 0 40px var(--accent-glow);
      line-height: 1;
      transition: transform var(--duration-fast) var(--ease-spring), color var(--duration-fast);
    }

    .rep-count.flash {
      transform: scale(1.25);
      color: var(--accent);
    }

    .rep-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
      margin-top: 4px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* ── Mode Selector ── */
    .mode-selector {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
    }

    .mode-bottom {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .mode-trigger {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 12px 7px 14px;
      border: none;
      border-radius: var(--radius-full);
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--duration-fast);
      font-family: inherit;
    }

    .mode-trigger:hover {
      background: rgba(0, 0, 0, 0.55);
    }

    .trigger-chevron {
      width: 10px;
      height: 10px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform var(--duration-fast) var(--ease-out);
    }

    .mode-selector.open .trigger-chevron {
      transform: rotate(180deg);
    }

    .mode-options {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 4px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius-md);
      border: 1px solid rgba(255, 255, 255, 0.06);
      margin-bottom: 6px;
      transform: scaleY(0);
      transform-origin: bottom left;
      opacity: 0;
      transition: transform var(--duration-fast) var(--ease-out), opacity var(--duration-fast);
      pointer-events: none;
    }

    .mode-selector.open .mode-options {
      transform: scaleY(1);
      opacity: 1;
      pointer-events: auto;
    }

    .exercise-btn {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--duration-fast), color var(--duration-fast);
      white-space: nowrap;
      text-align: left;
      font-family: inherit;
    }

    .exercise-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .exercise-btn.active {
      background: var(--accent-dark);
      color: #ffffff;
      font-weight: 600;
    }

    .exercise-btn.active[data-exercise="off"] {
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.6);
    }

    #resetBtn {
      display: none;
      padding: 6px 12px;
      border: none;
      border-radius: var(--radius-full);
      background: rgba(248, 113, 113, 0.6);
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--duration-fast);
      font-family: inherit;
    }

    #resetBtn:hover {
      background: rgba(248, 113, 113, 0.8);
    }

    /* ── Secondary Controls ── */
    .secondary-controls {
      position: absolute;
      bottom: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background var(--duration-fast);
      position: relative;
    }

    .icon-btn:hover {
      background: rgba(0, 0, 0, 0.55);
    }

    .icon-btn input[type="file"] {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Session Log ── */
    .session-log {
      display: none;
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--glass-border);
      border-top: none;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      padding: 16px 20px 20px;
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
    }

    .session-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .session-header h3 {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .session-summary {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .session-entries {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 40vh;
      overflow-y: auto;
    }

    .log-entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      border: 1px solid var(--border-light);
    }

    .log-entry.new {
      animation: slideUp 0.35s var(--ease-out) forwards;
    }

    .log-exercise {
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }

    .log-reps {
      color: var(--accent);
      font-weight: 700;
      margin: 0 12px;
    }

    .log-time {
      color: var(--text-muted);
      font-size: 0.72rem;
    }

    .session-log-empty {
      display: none;
      width: 100%;
      background: var(--bg-surface);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      padding: 20px;
      border: 1px solid var(--glass-border);
      border-top: none;
      text-align: center;
      backdrop-filter: blur(var(--glass-blur));
    }

    #clearSessionBtn {
      display: none;
      background: none;
      border: none;
      color: var(--red);
      font-size: 0.75rem;
      cursor: pointer;
      padding: 0;
      font-weight: 600;
      font-family: inherit;
      transition: opacity var(--duration-fast);
    }

    #clearSessionBtn:hover {
      opacity: 0.7;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      main {
        max-width: 100%;
      }
      .camera-stage {
        border-radius: 0;
        border-left: none;
        border-right: none;
      }
      .session-log {
        border-radius: 0;
        border-left: none;
        border-right: none;
      }
      .exercise-btn {
        font-size: 0.75rem;
        padding: 7px 14px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <h1>CV <span>Exercise Tracker</span></h1>
      <div class="auth-section hidden" id="authSection">
        <span class="auth-user" id="authUser"></span>
        <button class="auth-btn" id="authBtn">Sign In</button>
      </div>
    </div>
    <p class="intro-msg">Currently supports pushup, squat, and lunge tracking in profile view.</p>
  </header>

  <!-- Auth Modal -->
  <div class="auth-modal-backdrop" id="authModal">
    <div class="auth-modal">
      <h2 id="authModalTitle">Sign In</h2>
      <input type="email" id="authEmail" placeholder="Email" autocomplete="email">
      <input type="password" id="authPassword" placeholder="Password" autocomplete="current-password">
      <div class="auth-modal-actions">
        <button class="auth-btn" id="authCancel">Cancel</button>
        <button class="auth-btn primary" id="authSubmit">Sign In</button>
      </div>
      <div class="auth-error" id="authError"></div>
      <div class="auth-toggle">
        <span id="authToggleText">Don't have an account?</span>
        <a id="authToggleLink">Sign Up</a>
      </div>
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <a class="tab-link active" href="index.html">
      <svg class="tab-icon" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><path d="M12 7v5m-3 3l3-3 3 3m-6 3v2m6-2v2"/></svg>
      Tracker
    </a>
    <a class="tab-link" href="garmin.html">
      <svg class="tab-icon" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      Garmin
    </a>
    <a class="tab-link" href="training.html">
      <svg class="tab-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      Training AI
    </a>
  </nav>

  <main>
    <div class="camera-stage">
      <!-- Loading overlay -->
      <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p id="status">Loading model...</p>
        <div class="fallback-controls" id="fallbackControls">
          <label class="fallback-btn">
            Upload Photo
            <input type="file" id="uploadInput" accept="image/*">
          </label>
          <label class="fallback-btn">
            Take Photo
            <input type="file" id="cameraInput" accept="image/*" capture="environment">
          </label>
        </div>
      </div>

      <!-- Video + Canvas -->
      <video id="video" playsinline></video>
      <canvas id="canvas"></canvas>

      <!-- Rep counter overlay -->
      <div class="rep-overlay" id="repOverlay">
        <div class="rep-count" id="repCount">0</div>
        <div class="rep-label" id="repLabel"></div>
      </div>

      <!-- Mode selector (collapsible) -->
      <div class="mode-selector" id="modeSelector">
        <div class="mode-options" id="modeOptions">
          <button class="exercise-btn active" data-exercise="auto">Auto</button>
          <button class="exercise-btn" data-exercise="squat">Squats</button>
          <button class="exercise-btn" data-exercise="pushup">Pushups</button>
          <button class="exercise-btn" data-exercise="lunge">Lunges</button>
          <button class="exercise-btn" data-exercise="off">Off</button>
        </div>
        <div class="mode-bottom">
          <button class="mode-trigger" id="modeTrigger">
            <span id="modeTriggerLabel">Auto</span>
            <svg class="trigger-chevron" viewBox="0 0 12 12"><polyline points="3,8 6,5 9,8"/></svg>
          </button>
          <button id="resetBtn">Reset</button>
        </div>
      </div>

      <!-- Secondary controls -->
      <div class="secondary-controls" id="uploadControls">
        <label class="icon-btn" title="Upload Photo">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <input type="file" id="uploadInput2" accept="image/*">
        </label>
        <button class="icon-btn" id="cameraToggle" title="Stop Camera">
          <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
        </button>
      </div>
    </div>

    <!-- Session Log -->
    <div id="sessionLog" class="session-log">
      <div class="session-header">
        <h3>Session</h3>
        <div style="display:flex;align-items:baseline;gap:10px">
          <span id="sessionSummary" class="session-summary"></span>
          <button id="clearSessionBtn">Clear Session</button>
        </div>
      </div>
      <div id="sessionEntries" class="session-entries"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.6/dist/knn-classifier.min.js"></script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
