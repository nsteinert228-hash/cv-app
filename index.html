<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pose Estimation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      padding: 24px 20px 12px;
      text-align: center;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f0f0f0;
    }

    .controls {
      display: flex;
      gap: 12px;
      padding: 12px 20px 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #2a2a4a;
      color: #e0e0e0;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #3a3a5a; }

    .btn input[type="file"] {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .canvas-wrap {
      display: flex;
      justify-content: center;
      padding: 0 20px 20px;
    }

    canvas {
      border-radius: 8px;
      display: none;
    }

    #status {
      padding: 8px 16px;
      font-size: 0.9rem;
      color: #aaa;
      text-align: center;
      min-height: 1.5em;
    }

    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 320px;
      height: 240px;
      border: 2px dashed #444;
      border-radius: 8px;
      color: #666;
      font-size: 0.95rem;
    }

    #video {
      display: none;
    }

    .exercise-controls {
      display: flex;
      gap: 8px;
      padding: 0 20px 16px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .exercise-btn {
      padding: 8px 16px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #2a2a4a;
      color: #e0e0e0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .exercise-btn:hover { background: #3a3a5a; }

    .exercise-btn.active {
      background: #3a5a3a;
      border-color: #5a8a5a;
      color: #c0f0c0;
    }

    #resetBtn {
      display: none;
      padding: 8px 16px;
      border: 1px solid #664444;
      border-radius: 8px;
      background: #4a2a2a;
      color: #e0c0c0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #resetBtn:hover { background: #5a3a3a; }
  </style>
</head>
<body>

  <header>
    <h1>Pose Estimation</h1>
  </header>

  <div class="controls">
    <div id="uploadControls" style="display: flex; gap: 12px;">
      <label class="btn">
        Upload Photo
        <input type="file" id="uploadInput" accept="image/*">
      </label>
      <label class="btn">
        Take Photo
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
      </label>
    </div>
    <button class="btn" id="cameraToggle">Start Camera</button>
  </div>

  <div class="exercise-controls">
    <button class="exercise-btn active" data-exercise="off">Off</button>
    <button class="exercise-btn" data-exercise="squat">Squats</button>
    <button class="exercise-btn" data-exercise="pushup">Pushups</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="status">Loading model...</div>

  <div class="canvas-wrap">
    <div id="placeholder" class="placeholder">Upload a photo or start the camera</div>
    <canvas id="canvas"></canvas>
  </div>

  <video id="video" playsinline></video>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
