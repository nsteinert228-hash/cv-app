name: Garmin Sync

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garmin-sync

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: garmin-sync/requirements.txt

      - name: Install dependencies
        run: |
          pip install garmy==2.0.0
          pip install supabase==2.28.0 python-dotenv==1.2.2

      # Restore cached garmy OAuth tokens so we skip SSO login
      - name: Restore Garmin tokens
        uses: actions/cache@v4
        with:
          path: ~/.garmy
          key: garmin-tokens-${{ secrets.GARMIN_ENCRYPTION_KEY && 'active' || 'none' }}

      - name: Run sync-all
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GARMIN_ENCRYPTION_KEY: ${{ secrets.GARMIN_ENCRYPTION_KEY }}
          GARMIN_TOKEN_DIR: ~/.garmy
        run: python main.py sync-all

      # Always save tokens after sync (even on failure) so next run can resume
      - name: Save Garmin tokens
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.garmy
          key: garmin-tokens-${{ secrets.GARMIN_ENCRYPTION_KEY && 'active' || 'none' }}
