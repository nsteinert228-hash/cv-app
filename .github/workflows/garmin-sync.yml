name: Garmin Sync

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garmin-sync

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: garmin-sync/requirements.txt

      - name: Install dependencies
        run: |
          pip install garmy==2.0.0
          pip install supabase==2.28.0 python-dotenv==1.2.2

      # Restore garmy OAuth tokens from GitHub Secrets so we never hit SSO.
      # sync-all uses per-user token dirs: ~/.garmy/<user-uuid>/
      - name: Restore Garmin tokens
        env:
          OAUTH1: ${{ secrets.GARMIN_OAUTH1_TOKEN }}
          OAUTH2: ${{ secrets.GARMIN_OAUTH2_TOKEN }}
        run: |
          mkdir -p ~/.garmy/f294591a-c538-4370-8903-dcbeab4af1be
          python3 -c "
          import os, pathlib
          d = pathlib.Path.home() / '.garmy' / 'f294591a-c538-4370-8903-dcbeab4af1be'
          (d / 'oauth1_token.json').write_text(os.environ['OAUTH1'])
          (d / 'oauth2_token.json').write_text(os.environ['OAUTH2'])
          print('Tokens written to', d)
          "

      - name: Run sync-all
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GARMIN_ENCRYPTION_KEY: ${{ secrets.GARMIN_ENCRYPTION_KEY }}
          GARMIN_TOKEN_DIR: ~/.garmy
        run: python main.py sync-all
