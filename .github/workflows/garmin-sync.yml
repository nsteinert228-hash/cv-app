name: Garmin Sync

on:
  # schedule disabled — Garmin blocks cloud/datacenter IPs
  # Run locally: python main.py sync --today --user-id f294591a-c538-4370-8903-dcbeab4af1be
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garmin-sync

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: garmin-sync/requirements.txt

      - name: Install dependencies
        run: |
          pip install garmy==2.0.0
          pip install supabase==2.28.0 python-dotenv==1.2.2

      # Restore garmy OAuth tokens from base64-encoded GitHub Secrets.
      # Base64 avoids JSON corruption from GitHub's secret masking.
      # sync-all uses per-user token dirs: ~/.garmy/<user-uuid>/
      - name: Restore Garmin tokens
        env:
          OAUTH1_B64: ${{ secrets.GARMIN_OAUTH1_TOKEN_B64 }}
          OAUTH2_B64: ${{ secrets.GARMIN_OAUTH2_TOKEN_B64 }}
        run: |
          python3 -c "
          import os, pathlib, base64, json
          d = pathlib.Path.home() / '.garmy' / 'f294591a-c538-4370-8903-dcbeab4af1be'
          d.mkdir(parents=True, exist_ok=True)
          o1 = base64.b64decode(os.environ['OAUTH1_B64']).decode()
          o2 = base64.b64decode(os.environ['OAUTH2_B64']).decode()
          (d / 'oauth1_token.json').write_text(o1)
          (d / 'oauth2_token.json').write_text(o2)
          t1 = json.loads(o1)
          t2 = json.loads(o2)
          print(f'OAuth1: OK ({len(t1)} keys)')
          print(f'OAuth2: OK ({len(t2)} keys, expires_at={t2.get(\"expires_at\")})')
          "

      - name: Run sync-all
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GARMIN_ENCRYPTION_KEY: ${{ secrets.GARMIN_ENCRYPTION_KEY }}
          GARMIN_TOKEN_DIR: ~/.garmy
        run: python main.py sync-all
